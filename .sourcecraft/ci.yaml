name: Lab CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install nbconvert nbformat
      
      - name: Execute notebook
        run: |
          jupyter nbconvert --to notebook --execute lab.ipynb --output lab_executed.ipynb
      
      - name: Generate HTML report
        run: |
          jupyter nbconvert --to html lab_executed.ipynb --output lab_report
      
      - name: Upload HTML report as artifact
        uses: actions/upload-artifact@v3
        with:
          name: lab-report
          path: lab_report.html
          retention-days: 30
      
      - name: Upload executed notebook as artifact
        uses: actions/upload-artifact@v3
        with:
          name: executed-notebook
          path: lab_executed.ipynb
          retention-days: 30