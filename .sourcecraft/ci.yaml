on:
  push:
    - workflows: [lab-check]
      filter:
        branches: ["main", "master"]

workflows:
  lab-check:
    tasks:
      - name: run-lab
        cubes:
          - name: python-runner
            image: docker.io/library/python:3.11
            script:
              - pip install -q --upgrade pip
              - pip install -q -r requirements.txt
              - pip install -q jupyter nbconvert
              - jupyter nbconvert --to notebook --execute lab.ipynb --output lab_executed.ipynb
              - jupyter nbconvert --to html lab_executed.ipynb --output lab_report
            artifacts:
              paths:
                - lab_executed.ipynb
                - lab_report.html